server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:communityconnect;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      initialization-fail-timeout: 0
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

logging:
  level:
    com.communityapp: INFO
    org.springframework.security: INFO

app:
  jwt:
    secret: ${JWT_SECRET:local-community-connect-secret-key-32-chars-minimum}
  seed:
    sample-password: ${SEED_SAMPLE_PASSWORD:Pass@123}
