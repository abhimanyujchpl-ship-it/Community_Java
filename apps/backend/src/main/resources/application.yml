server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

spring:
  application:
    name: community-app
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/community_app}
    username: ${DATABASE_USERNAME:community_app}
    password: ${DATABASE_PASSWORD:Abhi_1208}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  sql:
    init:
      mode: never

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006}

springdoc:
  api-docs:
    path: /docs/api
  swagger-ui:
    path: /docs/swagger

management:
  endpoints:
    web:
      exposure:
        include: health,info
