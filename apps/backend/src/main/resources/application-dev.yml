spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}

logging:
  level:
    com.communityapp: DEBUG
    org.springframework.security: INFO

app:
  jwt:
    secret: ${JWT_SECRET:dev-community-connect-secret-key-32-chars-minimum}
  seed:
    sample-password: ${SEED_SAMPLE_PASSWORD:Pass@123}
